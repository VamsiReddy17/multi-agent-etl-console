[core]
dags_folder = /app/airflow/dags
plugins_folder = /app/airflow/plugins
base_log_folder = /app/airflow/logs
load_examples = False
executor = CeleryExecutor
parallelism = 32
max_active_tasks_per_dag = 16
enable_xcom_pickling = True

[database]
sql_alchemy_conn = postgresql+psycopg2://postgres:postgres_password@postgres:5432/airflow

[celery]
broker_url = redis://redis:6379/0
result_backend = db+postgresql://postgres:postgres_password@postgres:5432/airflow
flower_port = 5555

[webserver]
base_log_folder = /app/airflow/logs
expose_config = True
web_server_port = 8080

[scheduler]
dag_dir_list_interval = 300
scheduler_heartbeat_interval = 5

[logging]
remote_logging = False
