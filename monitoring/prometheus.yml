# Prometheus scrape configuration for production-pipeline
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "pipeline_metrics"
    static_configs:
      - targets: ["host.docker.internal:8000", "airflow_webserver:8000", "airflow_scheduler:8000", "airflow_worker:8000"]
    metrics_path: /metrics
    scheme: http

  - job_name: "airflow"
    static_configs:
      - targets: ["airflow_webserver:8080"]
    metrics_path: /metrics

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres:5432"]
